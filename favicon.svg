<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00CC00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FF00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a" rx="64"/>
  
  <!-- Border glow -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="url(#greenGlow)" stroke-width="8" rx="48" filter="url(#glow)"/>
  
  <!-- JM Text -->
  <text x="50%" y="55%" font-family="'Courier New', monospace" font-size="280" font-weight="bold" 
        fill="url(#greenGlow)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">
    JM
  </text>
  
  <!-- Small tech detail lines -->
  <line x1="100" y1="400" x2="180" y2="400" stroke="#00FF00" stroke-width="6"/>
  <line x1="332" y1="400" x2="412" y2="400" stroke="#00FF00" stroke-width="6"/>
</svg>